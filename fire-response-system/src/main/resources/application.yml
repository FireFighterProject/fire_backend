server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3330/fire_response_system?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none   # 이미 스키마 만들어뒀으니 none 유지
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc.time_zone: Asia/Seoul

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true

jwt:
  secret: change-this-secret-please-change-to-32+bytes-123456
  access-token-validity-seconds: 3600
