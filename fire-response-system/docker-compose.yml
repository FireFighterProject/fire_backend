services:
  nginx:
    image: nginx:alpine
    container_name: fire-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  app:
    build: .
    container_name: fire-response-system
    expose:
      - "8081"
    env_file:
      - .env
    restart: unless-stopped
